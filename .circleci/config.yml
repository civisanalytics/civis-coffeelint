version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker build -t civis-coffeelint .
      - run:
          name: Run tests in container
          command: docker run civis-coffeelint

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
